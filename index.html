<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xBox Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <nav>
          <ul>
            <div class="nav_bar">
              <li>
                <a href="#"
                  ><img src="img/logo.svg" alt="" class="xbox-logo"
                /></a>
              </li>
              <li><a href="#">Games</a></li>
              <li><a href="#">Consoles</a></li>
              <li><a href="#">Community</a></li>
              <li>
                <form class="minimal-form">
                  <input type="text" placeholder="Search" />
                </form>
              </li>
              <li><a href="#">My XBOX</a></li>
            </div>
          </ul>
        </nav>
      </div>
    </header>
<main>
  <section class="hero-banner">
    <img src="img/one.png" alt="Call of Duty: WWII" class="banner-img">
    <div class="banner-overlay">
      <div class="container banner-flex">
        <div class="banner-content">
          <h1>Call of Duty: WWII</h1>
          <p>Released on: 23/11/2017</p>
          <div class="banner-btns">
            <a href="#" class="btn btn-green">Order Now</a>
            <a href="#" class="btn btn-gray">More Games</a>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section class="game-details">
    <div class="container">
      <div class="details-header">
        <h2>Call of Duty: WWII</h2>
        <div class="details-btns">
          <a href="#" class="btn btn-green">Order Now</a>
          <a href="#" class="btn btn-dark">Technical Specifications</a>
        </div>
      </div>
      <div class="video-section">
        <div class="video-wrapper">
          <img src="img/Video.png" alt="Video">
          <div class="play-btn"></div>
        </div>
      </div>
      <div class="info-block">
        <div class="info-text">
          <h3>Life Advice Looking <br> Through A Window</h3>
        </div>
        <div class="info-img">
          <img src="img/free.png" alt="Soldier">
        </div>
      </div>
      <div class="info-block reverse">
        <div class="info-text">
          <h3>The Best Answers</h3>
        </div>
        <div class="info-img">
          <img src="img/four.png" alt="Soldier">
        </div>
      </div>
    </div>
  </section>
